<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Início</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #3fa14c;
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }
    </style>
</head>
<body>

<div class="box">
    <h1 th:text="${titulo}">Sistema</h1>
    <p th:text="${mensagem}">Mensagem de boas-vindas</p>
</div>

</body>
</html>
