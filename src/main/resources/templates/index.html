<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Início</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #3fa14c;
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        .links {
            display:flex;
            justify-content: space-around;
        }

        .links a {
            color: #3fa14c;
        }
    </style>
</head>
<body>

<!-- Usuário NÃO logado -->
<div class="box" th:if="${session.participante == null}">
    <h1 th:text="${titulo}">Sistema</h1>
    <p th:text="${mensagem}">Mensagem de boas-vindas</p>
    <div class="links">
        <a th:href="@{/autenticacao/login}" class="btn-cancelar">Fazer Login</a>
        <a th:href="@{/autenticacao/cadastro}" class="btn-cadastro">Criar conta</a>
    </div>
</div>

<!-- Usuário logado -->
<div class="box" th:if="${session.participante != null}">
    <h1>Bem-vindo, <span th:text="${session.participante.nome}"></span>!</h1>
    <p th:text="${mensagem}">Mensagem de boas-vindas</p>

    <div class="links" th:if="${session.participante.admin == true}">
        <a th:href="@{/perguntas}">Gerenciar Perguntas</a>
        <br>
        <a th:href="@{/corridas}">Gerenciar Corridas</a>
    </div>

    <form th:action="@{/autenticacao/logout}" method="post">
        <button type="submit">Sair</button>
    </form>
</div>

</body>
</html>
