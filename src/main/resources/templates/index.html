<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <title>Início</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
    <style>
        .page-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 120px);
            background-color: #f4f4f4;
        }

        .box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #3fa14c;
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        .links {
            display:flex;
            justify-content: space-around;
        }

        .links a {
            color: #3fa14c;
        }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="page-container">

        <!-- Usuário NÃO logado -->
        <div class="box" sec:authorize="!isAuthenticated()">
            <h1 th:text="${titulo}">Sistema</h1>
            <p th:text="${mensagem}">Mensagem de boas-vindas</p>
            <div class="links">
                <a th:href="@{/autenticacao/login}">Fazer Login</a>
                <a th:href="@{/autenticacao/cadastro}">Criar conta</a>
            </div>
        </div>

        <!-- Usuário logado -->
        <div class="box" sec:authorize="isAuthenticated()">
            <h1>Bem-vindo, <span sec:authentication="name"></span>!</h1>
            <p th:text="${mensagem}">Mensagem de boas-vindas</p>

            <div class="links" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/perguntas}">Gerenciar Perguntas</a>
                <br>
                <a th:href="@{/corridas}">Gerenciar Corridas</a>
            </div>

            <form th:action="@{/autenticacao/logout}" method="post">
                <button type="submit">Sair</button>
            </form>
        </div>

    </div>
</main>

</html>
