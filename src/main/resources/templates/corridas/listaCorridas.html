<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <title>Gerenciar Corridas</title>
    <style>
        .gerenciar-container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gerenciar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .gerenciar-titulo {
            color: #2e7d32;
            font-size: 26px;
            margin: 0;
        }

        .btn-nova {
            background: #2e7d32;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-nova:hover { background: #1b5e20; }

        .mensagem-sucesso {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            padding: 10px 16px;
            color: #2e7d32;
            margin-bottom: 16px;
        }

        .mensagem-erro {
            background: #fdecea;
            border: 1px solid #f44336;
            border-radius: 6px;
            padding: 10px 16px;
            color: #c62828;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }

        thead { background: #2e7d32; color: white; }

        th { padding: 13px 14px; text-align: left; font-size: 14px; }

        td {
            padding: 13px 14px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tr:last-child td { border-bottom: none; }

        .badge {
            border-radius: 10px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-ativa   { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .badge-inativa { background: #f5f5f5; color: #757575; border: 1px solid #e0e0e0; }

        .td-vazia { text-align: center; color: #aaa; padding: 40px; }

        .acoes { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-editar, .btn-excluir, .btn-ver {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-editar  { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        .btn-excluir { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }
        .btn-ver     { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        .btn-editar:hover  { background: #ffe0b2; }
        .btn-excluir:hover { background: #ffcdd2; }
        .btn-ver:hover     { background: #bbdefb; }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="gerenciar-container">

        <div class="gerenciar-header">
            <h1 class="gerenciar-titulo">Gerenciar Corridas</h1>
            <a class="btn-nova" th:href="@{/corridas/nova}">+ Nova Corrida</a>
        </div>

        <p class="mensagem-sucesso" th:if="${mensagem}" th:text="${mensagem}"></p>
        <p class="mensagem-erro"    th:if="${aviso}"    th:text="${aviso}"></p>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Tempo (s)</th>
                    <th>Perguntas</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(corridas)}">
                    <td colspan="7" class="td-vazia">Nenhuma corrida cadastrada ainda.</td>
                </tr>
                <tr th:each="c, stat : ${corridas}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${c.titulo}"></td>
                    <td th:text="${c.descricao != null ? c.descricao : '—'}"></td>
                    <td th:text="${c.tempoSegundos}"></td>
                    <td th:text="${c.perguntas != null ? #lists.size(c.perguntas) : 0}"></td>
                    <td>
                        <span class="badge badge-ativa"   th:if="${c.ativa}">Ativa</span>
                        <span class="badge badge-inativa" th:unless="${c.ativa}">Inativa</span>
                    </td>
                    <td class="acoes">
                        <a class="btn-editar"
                           th:href="@{/corridas/{id}/editar(id=${c.id})}">Editar</a>
                        <a class="btn-excluir"
                           th:href="@{/corridas/{id}/excluir(id=${c.id})}"
                           th:data-titulo="${c.titulo}"
                           onclick="return confirm('Deseja realmente excluir a corrida \'' + this.dataset.titulo + '\'?')">Excluir</a>
                        <a class="btn-ver"
                           th:href="@{/corridas/{id}(id=${c.id})}">Detalhes</a>
                        <a class="btn-ver"
                           th:href="@{/perguntas(corridaId=${c.id})}">Perguntas</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</main>

</html>
