<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Corrida Cadastrada</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f9f4;
            color: #2d2d2d;
            padding: 40px;
        }

        h1 {
            color: #2e7d32;
            font-size: 28px;
            border-bottom: 3px solid #2e7d32;
            padding-bottom: 10px;
            margin-bottom: 28px;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 32px;
            max-width: 480px;
        }

        .card p {
            font-size: 15px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .card p strong {
            color: #2e7d32;
        }

        .pergunta {
            font-size: 16px;
            font-weight: bold;
            color: #2d2d2d;
            margin: 24px 0 20px;
        }

        .acoes {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-sim {
            background-color: #2e7d32;
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-sim:hover { background-color: #1b5e20; }

        .btn-nao {
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-nao:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Corrida cadastrada!</h1>

    <div class="card">
        <p>
            A corrida <strong th:text="${corrida.titulo}"></strong> foi registrada com sucesso.
        </p>

        <p class="pergunta">Deseja cadastrar perguntas para ela agora?</p>

        <div class="acoes">
            <!-- UC01 passo 4: sim → formulário de perguntas -->
            <a class="btn-sim" th:href="@{/perguntas/form(corridaId=${corrida.id})}">Sim, cadastrar perguntas</a>
            <!-- UC01 passo 5: não → lista de corridas -->
            <a class="btn-nao" th:href="@{/corridas}">Não, voltar à lista</a>
        </div>
    </div>

</body>
</html>
