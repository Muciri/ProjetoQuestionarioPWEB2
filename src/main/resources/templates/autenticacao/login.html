<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>

  <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        width: 400px;
        box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 4px;
    }

    .btn-login {
        background: #3fa14c;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 4px;
        width: 100%;
    }

    .btn-cadastro {
        display: block;
        text-align: center;
        margin-top: 10px;
        color: #666;
        text-decoration: none;
    }

    .erro {
        color: red;
    }

    .sucesso {
        color: green;
    }
  </style>
</head>
<body>

<div class="form-container">

  <h2>Login</h2>

  <p class="erro" th:if="${param.error}">
    Usuário ou senha inválidos.
  </p>

<!--  <p class="erro" th:if="${param.error}" th:text="${erro}"></p>-->

  <p class="sucesso" th:if="${param.logout}">
    Logout realizado com sucesso.
  </p>

  <p class="sucesso" th:if="${mensagem}" th:text="${mensagem}"></p>

  <form th:action="@{/autenticacao/login}" method="post">

    <div class="form-group">
      <label>Usuário:</label>
      <input type="text"
             name="username"
             required>
    </div>

    <div class="form-group">
      <label>Senha:</label>
      <input type="password"
             name="password"
             required>
    </div>

    <button type="submit" class="btn-login">
      Entrar
    </button>

    <a th:href="@{/autenticacao/cadastro}"
       class="btn-cadastro">
      Criar conta
    </a>

  </form>

</div>

</body>
</html>
