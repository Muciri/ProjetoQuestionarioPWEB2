<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 500px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .admin-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
        }

        .admin-check input {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .btn-salvar {
            background: #3fa14c;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #666;
            text-decoration: none;
        }

        .erro {
            color: red;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Cadastro de Usuário</h2>

    <p class="erro" th:if="${erro}" th:text="${erro}"></p>

    <form th:action="@{/autenticacao/salvar}" method="post">
        <div class="form-group">
            <label>Usuário:</label>
            <input type="text"
                   name="username"
                   required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email"
                   name="email"
                   required>
        </div>

        <div class="form-group">
            <label class="admin-check">
                <input type="checkbox" name="isAdmin">
                Administrador
            </label>
        </div>

        <div class="form-group">
            <label>Senha:</label>
            <input type="password"
                   name="password"
                   minlength="4"
                   required>
        </div>

        <button type="submit"
                class="btn-salvar">
            Cadastrar
        </button>

        <a th:href="@{/autenticacao/login}"
           class="btn-cancelar">
            Cancelar
        </a>
    </form>
</div>

</body>
</html>
