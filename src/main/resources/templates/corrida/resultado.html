<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <title>Resultado da Corrida</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />

    <style>
        * {
            box-sizing: border-box;
        }

        .resultado-container {
            min-height: calc(100vh - 120px);
            padding: 42px 20px;
            background: #f3f6f4;
        }

        .resultado-card {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #dfe7e1;
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .resultado-header {
            padding: 30px 32px;
            text-align: center;
            color: white;
            background: linear-gradient(135deg, #3fa14c, #2d7a37);
        }

        .resultado-header.expirou {
            background: linear-gradient(135deg, #d84315, #b71c1c);
        }

        .resultado-icone {
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            font-size: 1.9rem;
            font-weight: bold;
        }

        .resultado-titulo {
            margin: 0 0 8px;
            font-size: 1.85rem;
        }

        .resultado-mensagem {
            max-width: 540px;
            margin: 0 auto;
            color: #eef8f0;
            line-height: 1.5;
        }

        .resultado-body {
            padding: 28px 32px 32px;
        }

        .resultado-aviso,
        .resultado-erro {
            border-radius: 8px;
            padding: 12px 14px;
            margin: 0 0 18px;
            font-weight: bold;
        }

        .resultado-aviso {
            background: #fff3cd;
            border: 1px solid #ffcc80;
            color: #8a5a00;
        }

        .resultado-erro {
            background: #fdecea;
            border: 1px solid #ef9a9a;
            color: #c62828;
        }

        .corrida-nome {
            margin: 0 0 20px;
            color: #52605a;
            text-align: center;
        }

        .corrida-nome strong {
            color: #17211b;
        }

        .resultado-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-item {
            padding: 18px 14px;
            border: 1px solid #dfe7e1;
            border-radius: 8px;
            background: #fbfdfb;
            text-align: center;
        }

        .stat-valor {
            display: block;
            margin-bottom: 6px;
            font-size: 2rem;
            font-weight: bold;
            color: #2e7d32;
            overflow-wrap: anywhere;
        }

        .stat-valor.expirou {
            color: #c62828;
        }

        .stat-label {
            color: #52605a;
            font-size: 0.88rem;
            font-weight: bold;
        }

        .resultado-acoes {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .btn-ranking,
        .btn-lobby {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-ranking {
            background: #2e7d32;
            color: white;
        }

        .btn-ranking:hover {
            background: #1b5e20;
            transform: translateY(-1px);
        }

        .btn-lobby {
            grid-column: 1 / -1;
            background: #eef2f0;
            color: #2d3a32;
        }

        .btn-lobby:hover {
            background: #dfe7e1;
            transform: translateY(-1px);
        }

    </style>
</head>

<main layout:fragment="conteudo">
    <div class="resultado-container">
        <div class="resultado-card">

            <div class="resultado-header" th:classappend="${expirou} ? 'expirou' : ''">
                <div class="resultado-icone" th:text="${expirou} ? '!' : '✓'">✓</div>

                <h1 class="resultado-titulo"
                    th:text="${expirou} ? 'Tempo esgotado!' : 'Corrida concluída!'">
                    Corrida concluída!
                </h1>

                <p class="resultado-mensagem" th:if="${mensagem}" th:text="${mensagem}"></p>
            </div>

            <div class="resultado-body">
                <p class="resultado-aviso" th:if="${aviso}" th:text="${aviso}"></p>
                <p class="resultado-erro" th:if="${erro}" th:text="${erro}"></p>
                <p class="resultado-aviso" th:if="${jaParticipou}">
                    Você já tinha concluído esta corrida. Foi só uma nova tentativa  no ranking continua valendo a sua primeira pontuação.
                </p>

                <p class="corrida-nome">
                    Corrida:
                    <strong th:text="${corrida.titulo}">Nome da corrida</strong>
                </p>

                <div class="resultado-stats">
                    <div class="stat-item">
                        <span class="stat-valor" th:classappend="${expirou} ? 'expirou' : ''"
                            th:text="${pontuacao}">0</span>
                        <span class="stat-label">Pontuação final</span>
                    </div>

                    <div class="stat-item" th:if="${acertos != null}">
                        <span class="stat-valor" th:text="${acertos} + '/' + ${totalPerguntas}">0/0</span>
                        <span class="stat-label">Acertos</span>
                    </div>

                    <div class="stat-item">
                        <span class="stat-valor" th:text="${corrida.tempoSegundos} + 's'">0s</span>
                        <span class="stat-label">Tempo limite</span>
                    </div>
                </div>

                <div class="resultado-acoes">
                    <a class="btn-ranking" th:href="@{/ranking/{id}(id=${corrida.id})}">
                        Ranking desta corrida
                    </a>

                    <a class="btn-ranking" th:href="@{/ranking}">
                        Ranking geral
                    </a>

                    <a class="btn-lobby" th:href="@{/lobby}">
                        Voltar ao lobby
                    </a>
                </div>
            </div>

        </div>
    </div>
</main>

</html>
