<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
    <title>Lobby — Corridas Disponíveis</title>
    <style>
        .lobby-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .lobby-titulo {
            color: #2e7d32;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .lobby-subtitulo {
            color: #666;
            margin-bottom: 30px;
        }

        .mensagem-sucesso {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 6px;
            padding: 12px 16px;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .mensagem-aviso {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            color: #856404;
            margin-bottom: 20px;
        }

        .mensagem-erro {
            background: #fdecea;
            border: 1px solid #f44336;
            border-radius: 6px;
            padding: 12px 16px;
            color: #c62828;
            margin-bottom: 20px;
        }

        .corrida-card {
            background: #fff;
            border: 1px solid #c8e6c9;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .corrida-info h3 {
            margin: 0 0 6px;
            color: #1a1a1a;
            font-size: 18px;
        }

        .corrida-info p {
            margin: 0 0 10px;
            color: #555;
            font-size: 14px;
        }

        .corrida-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #777;
        }

        .corrida-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .corrida-acoes {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            min-width: 140px;
        }

        .btn-iniciar {
            background: #2e7d32;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .btn-iniciar:hover {
            background: #1b5e20;
        }

        .badge-feita {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-continuar {
            background: #f57c00;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .btn-continuar:hover {
            background: #e65100;
        }

        .badge-em-andamento {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .sem-corridas {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .sem-corridas p {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="lobby-container">
        <h1 class="lobby-titulo">Sala de Corridas</h1>
        <p class="lobby-subtitulo">Escolha uma corrida e tente completá-la dentro do tempo!</p>

        <div class="mensagem-sucesso" th:if="${mensagem}" th:text="${mensagem}"></div>
        <div class="mensagem-aviso" th:if="${aviso}" th:text="${aviso}"></div>
        <div class="mensagem-erro" th:if="${erro}" th:text="${erro}"></div>

        <!-- Nenhuma corrida ativa -->
        <div class="sem-corridas" th:if="${#lists.isEmpty(corridas)}">
            <p>Nenhuma corrida disponível no momento.</p>
            <small>Aguarde o administrador ativar uma corrida.</small>
        </div>

        <!-- Lista de corridas ativas -->
        <div th:each="c : ${corridas}" class="corrida-card">
            <div class="corrida-info">
                <h3 th:text="${c.titulo}">Título</h3>
                <p th:text="${c.descricao}">Descrição</p>
                <div class="corrida-meta">
                    <span>⏱ <span th:text="${c.tempoSegundos} + 's'"></span></span>
                    <span>❓ <span
                            th:text="${c.perguntas != null ? #lists.size(c.perguntas) : 0} + ' pergunta(s)'"></span></span>
                </div>
            </div>

            <div class="corrida-acoes">
                <span class="badge-em-andamento" th:if="${corridaAtivaId != null and c.id == corridaAtivaId}">Em
                    andamento</span>
                <span class="badge-feita" th:if="${corridaAtivaId == null and corridasFeitasIds.contains(c.id)}">✓ Já
                    participou</span>

                <a class="btn-continuar" th:if="${corridaAtivaId != null and c.id == corridaAtivaId}"
                    th:href="@{/corrida/{id}/pergunta/{i}(id=${c.id}, i=${indicePerguntaAtual})}">
                    Continuar
                </a>
                <a class="btn-iniciar" th:unless="${corridaAtivaId != null and c.id == corridaAtivaId}"
                    th:href="@{/corrida/{id}/iniciar(id=${c.id})}"
                    th:text="${corridasFeitasIds.contains(c.id)} ? 'Jogar Novamente' : 'Iniciar Corrida'">
                    Iniciar Corrida
                </a>
            </div>
        </div>
    </div>
</main>

</html>
