<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
    <title>Lobby - Corridas Disponíveis</title>

    <style>
        * {
            box-sizing: border-box;
        }

        .lobby-page {
            min-height: calc(100vh - 120px);
            padding: 36px 20px;
            background: #f3f6f4;
        }

        .lobby-container {
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
        }

        .lobby-header {
            margin-bottom: 24px;
            padding: 26px 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3fa14c, #2d7a37);
            color: white;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
        }

        .lobby-titulo {
            margin: 0 0 8px;
            font-size: 1.9rem;
        }

        .lobby-subtitulo {
            margin: 0;
            color: #e9f7ec;
        }

        .mensagem-sucesso,
        .mensagem-aviso,
        .mensagem-erro {
            border-radius: 8px;
            padding: 13px 16px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .mensagem-sucesso {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #2e7d32;
        }

        .mensagem-aviso {
            background: #fff3cd;
            border: 1px solid #ffcc80;
            color: #8a5a00;
        }

        .mensagem-erro {
            background: #fdecea;
            border: 1px solid #ef9a9a;
            color: #c62828;
        }

        .corridas-lista {
            display: grid;
            gap: 16px;
        }

        .corrida-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 20px 22px;
            border: 1px solid #dfe7e1;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 5px 16px rgba(0, 0, 0, 0.06);
        }

        .corrida-card.em-andamento {
            border-color: #f57c00;
            box-shadow: 0 6px 18px rgba(245, 124, 0, 0.12);
        }

        .corrida-info h3 {
            margin: 0 0 8px;
            color: #17211b;
            font-size: 1.2rem;
        }

        .corrida-info p {
            margin: 0 0 14px;
            color: #52605a;
            line-height: 1.45;
        }

        .corrida-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.9rem;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #f3f6f4;
            color: #3f4d45;
            font-weight: bold;
        }

        .corrida-acoes {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            min-width: 170px;
        }

        .badge-feita,
        .badge-em-andamento {
            display: inline-block;
            border-radius: 999px;
            padding: 5px 11px;
            font-size: 0.78rem;
            font-weight: bold;
        }

        .badge-feita {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .badge-em-andamento {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }

        .btn-iniciar,
        .btn-continuar {
            width: 100%;
            padding: 11px 18px;
            border-radius: 8px;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-iniciar {
            background: #2e7d32;
        }

        .btn-iniciar:hover {
            background: #1b5e20;
            transform: translateY(-1px);
        }

        .btn-continuar {
            background: #f57c00;
        }

        .btn-continuar:hover {
            background: #e65100;
            transform: translateY(-1px);
        }

        .sem-corridas {
            padding: 54px 22px;
            border: 1px dashed #b7c6bb;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
            color: #52605a;
        }

        .sem-corridas p {
            margin: 0 0 8px;
            color: #17211b;
            font-size: 1.15rem;
            font-weight: bold;
        }

    </style>
</head>

<main layout:fragment="conteudo">
    <div class="lobby-page">
        <div class="lobby-container">

            <div class="lobby-header">
                <h1 class="lobby-titulo">Sala de Corridas</h1>
                <p class="lobby-subtitulo">Escolha uma corrida, responda as perguntas e tente pontuar dentro do tempo.</p>
            </div>

            <div class="mensagem-sucesso" th:if="${mensagem}" th:text="${mensagem}"></div>
            <div class="mensagem-aviso" th:if="${aviso}" th:text="${aviso}"></div>
            <div class="mensagem-erro" th:if="${erro}" th:text="${erro}"></div>

            <div class="sem-corridas" th:if="${#lists.isEmpty(corridas)}">
                <p>Nenhuma corrida disponível no momento.</p>
                <small>Aguarde o administrador ativar uma corrida.</small>
            </div>

            <div class="corridas-lista" th:if="${!#lists.isEmpty(corridas)}">
                <div th:each="c : ${corridas}" class="corrida-card"
                    th:classappend="${corridaAtivaId != null and c.id == corridaAtivaId} ? 'em-andamento' : ''">

                    <div class="corrida-info">
                        <h3 th:text="${c.titulo}">Título</h3>
                        <p th:text="${c.descricao}">Descrição</p>

                        <div class="corrida-meta">
                            <span class="meta-item">
                                Tempo:
                                <span th:text="${c.tempoSegundos} + 's'">60s</span>
                            </span>
                            <span class="meta-item">
                                Perguntas:
                                <span th:text="${c.perguntas != null ? #lists.size(c.perguntas) : 0}">0</span>
                            </span>
                        </div>
                    </div>

                    <div class="corrida-acoes">
                        <span class="badge-em-andamento" th:if="${corridaAtivaId != null and c.id == corridaAtivaId}">
                            Em andamento
                        </span>

                        <span class="badge-feita" th:if="${corridaAtivaId == null and corridasFeitasIds.contains(c.id)}">
                            Já participou
                        </span>

                        <a class="btn-continuar" th:if="${corridaAtivaId != null and c.id == corridaAtivaId}"
                            th:href="@{/corrida/{id}/pergunta/{i}(id=${c.id}, i=${indicePerguntaAtual})}">
                            Continuar corrida
                        </a>

                        <a class="btn-iniciar" th:unless="${corridaAtivaId != null and c.id == corridaAtivaId}"
                            th:href="@{/corrida/{id}/iniciar(id=${c.id})}"
                            th:text="${corridasFeitasIds.contains(c.id)} ? 'Jogar novamente' : 'Iniciar corrida'">
                            Iniciar corrida
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

</html>
