<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
    <title>Perguntas</title>

    <style>
        .page-container {
            display: flex;
            justify-content: center;
            padding: 40px;
            background-color: #f4f4f4;
        }

        .box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 700px;
        }

        h1 {
            color: #3fa14c;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        .mensagem {
            color: green;
        }

        .erro {
            color: red;
        }

        .admin-actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-nova,
        .btn-filtrar,
        .btn-limpar {
            background: #3fa14c;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .filtro-form {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .filtro-form select {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            min-width: 220px;
        }

        .pergunta {
            text-align: left;
            margin-bottom: 15px;
            padding: 10px;
            border-left: 4px solid #3fa14c;
            background-color: #fafafa;
            border-radius: 4px;
        }

        .alternativas {
            margin-top: 5px;
            padding-left: 15px;
        }

        .alternativas li {
            color: #333;
        }

        .acoes-pergunta {
            margin-top: 10px;
        }

        .editar {
            color: orange;
            margin-right: 15px;
        }

        .excluir {
            color: red;
        }

        .info-corrida {
            font-size: 0.95rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="page-container">
        <div class="box">
            <h1 th:text="${titulo}">Lista de Perguntas</h1>

            <p th:text="${mensagem}" class="mensagem"></p>
            <p th:text="${erro}" class="erro"></p>

            <form th:action="@{/perguntas}" method="get" class="filtro-form">
                <select name="corridaId">
                    <option value="">Todas as corridas</option>
                    <option th:each="corrida : ${corridas}" th:value="${corrida.id}" th:text="${corrida.titulo}"
                        th:selected="${corridaIdSelecionada != null and corridaIdSelecionada == corrida.id}">
                    </option>
                </select>

                <button type="submit" class="btn-filtrar">Filtrar</button>
                <a th:href="@{/perguntas}" class="btn-limpar">Limpar</a>
            </form>

            <div class="admin-actions">
                <a th:href="@{/perguntas/form}" class="btn-nova">+ Nova Pergunta</a>
            </div>

            <div th:if="${#lists.isEmpty(perguntas)}">
                <p>Nenhuma pergunta encontrada.</p>
            </div>

            <div th:each="pergunta : ${perguntas}" class="pergunta">
                <strong th:text="${pergunta.enunciado}"></strong>

                <p class="info-corrida">
                    <strong>Corrida:</strong>
                    <span th:text="${pergunta.corrida.titulo}"></span>
                </p>

                <p>
                    <strong>Pontos:</strong>
                    <span th:text="${pergunta.pontos}">1</span>
                </p>

                <ul class="alternativas">
                    <li th:each="alt, iterStat : ${pergunta.alternativas}" th:text="${iterStat.index} + ' - ' + ${alt}">
                    </li>
                </ul>

                <p>
                    <strong>Resposta correta:</strong>
                    <span th:text="${pergunta.respostaCorreta}"></span>
                </p>

                <div class="acoes-pergunta">
                    <a th:href="@{/perguntas/editar/{id}(id=${pergunta.id})}" class="editar">Editar</a>
                    <a th:href="@{/perguntas/excluir/{id}(id=${pergunta.id})}" class="excluir"
                        onclick="return confirm('Tem certeza que deseja excluir?')">
                        Excluir
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</html>
