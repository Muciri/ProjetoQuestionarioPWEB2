<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <title>Perguntas</title>

    <style>
        .page-container {
            display: flex;
            justify-content: center;
            padding: 40px;
            background-color: #f4f4f4;
        }

        .box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 600px;
        }

        h1 {
            color: #3fa14c;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        .mensagem {
            color: green;
        }

        .erro {
            color: red;
        }

        .admin-actions {
            margin-bottom: 20px;
        }

        .btn-nova {
            background: #3fa14c;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
        }

        .pergunta {
            text-align: left;
            margin-bottom: 15px;
            padding: 10px;
            border-left: 4px solid #3fa14c;
            background-color: #fafafa;
            border-radius: 4px;
        }

        .alternativas {
            margin-top: 5px;
            padding-left: 15px;
        }

        .alternativas li {
            color: #333;
        }

        .acoes-pergunta {
            margin-top: 10px;
        }

        .editar {
            color: orange;
            margin-right: 15px;
        }

        .excluir {
            color: red;
        }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="page-container">
        <div class="box">
            <h1 th:text="${titulo}">Lista de Perguntas</h1>

            <p th:text="${mensagem}" class="mensagem"></p>
            <p th:text="${erro}" class="erro"></p>

            <div th:if="${isAdmin}" class="admin-actions">
                <a th:href="@{/perguntas/form}" class="btn-nova">+ Nova Pergunta</a>
            </div>

            <div th:if="${#lists.isEmpty(perguntas)}">
                <p>Nenhuma pergunta encontrada.</p>
            </div>

            <div th:each="pergunta : ${perguntas}" class="pergunta">
                <strong th:text="${pergunta.enunciado}"></strong>

                <ul class="alternativas">
                    <li th:each="alt, iterStat : ${pergunta.alternativas}"
                        th:text="${iterStat.index} + ' - ' + ${alt}">
                    </li>
                </ul>

                <p>
                    <strong>Resposta correta:</strong>
                    <span th:text="${pergunta.respostaCorreta}"></span>
                </p>

                <div th:if="${isAdmin}" class="acoes-pergunta">
                    <a th:href="@{/perguntas/editar/{id}(id=${pergunta.id})}" class="editar">Editar</a>
                    <a th:href="@{/perguntas/excluir/{id}(id=${pergunta.id})}"
                       class="excluir"
                       onclick="return confirm('Tem certeza que deseja excluir?')">
                        Excluir
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</html>
