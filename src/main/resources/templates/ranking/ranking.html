<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/mainlayout}">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
    <title>Ranking</title>
    <style>
        .ranking-container {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .ranking-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .ranking-titulo {
            color: #2e7d32;
            font-size: 26px;
            margin: 0;
        }

        .ranking-subtitulo {
            color: #777;
            font-size: 14px;
            margin: 4px 0 0;
        }

        .btn-voltar {
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
        }

        .btn-voltar:hover {
            background: #e8f5e9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }

        thead {
            background: #2e7d32;
            color: white;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* UC09: destaque do participante logado */
        tr.linha-destaque td {
            background: #e8f5e9;
            font-weight: bold;
            color: #1b5e20;
        }

        .posicao {
            font-weight: bold;
            color: #2e7d32;
            font-size: 16px;
        }

        .posicao-ouro   { color: #f9a825; }
        .posicao-prata  { color: #9e9e9e; }
        .posicao-bronze { color: #a1887f; }

        .badge-voce {
            background: #2e7d32;
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 6px;
        }

        .sem-resultados {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        .sem-resultados p {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .paginacao-tamanho {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 14px;
            color: #555;
        }

        .paginacao-tamanho form {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .paginacao-tamanho select,
        .paginacao-tamanho input {
            padding: 6px 8px;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            font-size: 14px;
        }

        .paginacao-tamanho input {
            width: 70px;
        }

        .paginacao-tamanho button {
            padding: 6px 12px;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            background: #e8f5e9;
            color: #2e7d32;
            cursor: pointer;
        }

        .paginacao-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }

        .btn-pagina {
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
        }

        .btn-pagina:hover {
            background: #e8f5e9;
        }

        .btn-pagina.desativado {
            color: #bbb;
            border-color: #eee;
            cursor: default;
        }

        .info-pagina {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<main layout:fragment="conteudo">
    <div class="ranking-container">

        <div class="ranking-header">
            <div>
                <h1 class="ranking-titulo"
                    th:text="${corridaFiltro != null} ? '🏅 Ranking — ' + ${corridaFiltro.titulo} : '🏅 Ranking Geral'">
                    Ranking
                </h1>
                <p class="ranking-subtitulo"
                   th:text="${corridaFiltro != null}
                       ? 'Melhores pontuações desta corrida'
                       : 'Melhores pontuações de todas as corridas'">
                </p>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <a class="btn-voltar" th:href="@{/ranking}"
                   th:if="${corridaFiltro != null}">Ranking Geral</a>
                <a class="btn-voltar" th:href="@{/lobby}">← Lobby</a>
            </div>
        </div>

        <!-- Nenhum resultado -->
        <div class="sem-resultados" th:if="${resultados.empty}">
            <p>Nenhuma pontuação registrada ainda.</p>
            <small>Seja o primeiro a completar uma corrida!</small>
        </div>

        <!-- Melhoria 2: seletor do tamanho da página -->
        <div class="paginacao-tamanho" th:unless="${resultados.empty}"
             th:with="acao=${corridaFiltro != null} ? @{/ranking/{id}(id=${corridaFiltro.id})} : @{/ranking}">
            <form method="get" th:action="${acao}">
                <label for="size-select">Linhas por página:</label>
                <select id="size-select" name="size" onchange="this.form.submit()">
                    <option th:each="op : ${ {2, 3, 5, 10, 20} }"
                            th:value="${op}" th:text="${op}"
                            th:selected="${op == tamanhoPagina}"></option>
                </select>
            </form>
            <form method="get" th:action="${acao}">
                <label for="size-input">ou digite:</label>
                <input id="size-input" type="number" name="size" min="1" max="100"
                       th:value="${tamanhoPagina}"/>
                <button type="submit">Aplicar</button>
            </form>
        </div>

        <!-- Tabela de ranking -->
        <table th:unless="${resultados.empty}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Participante</th>
                    <th th:if="${corridaFiltro == null}">Corrida</th>
                    <th>Pontuação</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r, stat : ${resultados}"
                    th:with="posicao=${resultados.number * resultados.size + stat.count}"
                    th:classappend="${r.participante.id == participanteLogadoId} ? 'linha-destaque' : ''">

                    <!-- Posição com medalhas para o pódio -->
                    <td class="posicao"
                        th:classappend="${posicao == 1} ? 'posicao-ouro' : (${posicao == 2} ? 'posicao-prata' : (${posicao == 3} ? 'posicao-bronze' : ''))">
                        <span th:text="${posicao == 1} ? '🥇' : (${posicao == 2} ? '🥈' : (${posicao == 3} ? '🥉' : (${posicao})))"></span>
                    </td>

                    <!-- Nome + badge "Você" se for o participante logado -->
                    <td>
                        <span th:text="${r.participante.nome}"></span>
                        <span class="badge-voce"
                              th:if="${r.participante.id == participanteLogadoId}">Você</span>
                    </td>

                    <!-- Corrida (só no ranking geral) -->
                    <td th:if="${corridaFiltro == null}" th:text="${r.corrida.titulo}"></td>

                    <!-- Pontuação -->
                    <td th:text="${#numbers.formatDecimal(r.pontuacao, 1, 1)}"></td>

                    <!-- Data -->
                    <td th:text="${#temporals.format(r.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                </tr>
            </tbody>
        </table>

        <!-- Melhoria 2: navegação entre as páginas -->
        <div class="paginacao-nav" th:if="${resultados.totalPages > 1}"
             th:with="anterior=${corridaFiltro != null} ? @{/ranking/{id}(id=${corridaFiltro.id}, page=${resultados.number - 1}, size=${tamanhoPagina})} : @{/ranking(page=${resultados.number - 1}, size=${tamanhoPagina})},
                      proxima=${corridaFiltro != null} ? @{/ranking/{id}(id=${corridaFiltro.id}, page=${resultados.number + 1}, size=${tamanhoPagina})} : @{/ranking(page=${resultados.number + 1}, size=${tamanhoPagina})}">

            <a class="btn-pagina" th:href="${anterior}" th:unless="${resultados.first}">← Anterior</a>
            <span class="btn-pagina desativado" th:if="${resultados.first}">← Anterior</span>

            <span class="info-pagina"
                  th:text="'Página ' + (${resultados.number + 1}) + ' de ' + ${resultados.totalPages}"></span>

            <a class="btn-pagina" th:href="${proxima}" th:unless="${resultados.last}">Próxima →</a>
            <span class="btn-pagina desativado" th:if="${resultados.last}">Próxima →</span>
        </div>

        <!-- UC09: aviso se o participante logado não tem pontuação -->
        <p style="margin-top:20px; color:#888; font-size:13px; text-align:center;"
           th:if="${!resultados.empty and !participanteTemPontuacao}">
            Você ainda não possui pontuação neste ranking. Complete uma corrida para aparecer aqui!
        </p>

    </div>
</main>

</html>
